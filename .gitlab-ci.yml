# ======
# Jacobi
# ======

Jacobi5General_mono synthesis:
    extends: .synthesis
    variables:
        STST_EXAMPLE: "jacobi"
        STST_EXECUTABLE: "Jacobi5General_mono"

Jacobi5General_mono benchmark:
    extends: .fpga_benchmark
    needs:
        - Jacobi5General_mono synthesis
    variables:
        STST_EXAMPLE: "jacobi"
        STST_EXECUTABLE: "Jacobi5General_mono"
        STST_N_RANKS: 1
        STST_VARIANT: "" # Left empty, automatically supplied by binary

Jacobi5General_multi_mono synthesis:
    extends: .synthesis
    variables:
        STST_EXAMPLE: "jacobi"
        STST_EXECUTABLE: "Jacobi5General_multi_mono"

Jacobi5General_multi_mono benchmark:
    extends: .fpga_benchmark
    needs:
        - Jacobi5General_multi_mono synthesis
    variables:
        STST_EXAMPLE: "jacobi"
        STST_EXECUTABLE: "Jacobi5General_multi_mono"
        STST_N_RANKS: 24
        STST_VARIANT: "" # Left empty, automatically supplied by binary

Jacobi5General_tiling synthesis:
    extends: .synthesis
    variables:
        STST_EXAMPLE: "jacobi"
        STST_EXECUTABLE: "Jacobi5General_tiling"

Jacobi5General_tiling benchmark:
    extends: .fpga_benchmark
    needs:
        - Jacobi5General_tiling synthesis
    variables:
        STST_EXAMPLE: "jacobi"
        STST_EXECUTABLE: "Jacobi5General_tiling"
        STST_N_RANKS: 1
        STST_VARIANT: "" # Left empty, automatically supplied by binary

# ===============
# CUDA benchmarks
# ===============

CUDA benchmark:
    extends:
        - .cuda_job
        - .expensive_job
    stage: preevaluation
    tags:
        - noctua2
    variables:
        SCHEDULER_PARAMETERS: -A $SLURM_ACCOUNT -p gpu --gres=gpu:a100:1 -c 16 --mem 16G --time=01:00:00
    script:
        - mkdir -p build
        - cd build
        - cmake ..
        - make unit_test_cuda convection_cuda hotspot_cuda fdtd_coef_device_cuda Jacobi5General_cuda -j16
        - ./tests/unit_test_cuda
        - cd ../examples/convection
        - ./scripts/benchmark.jl max_perf ../../build/examples/convection/convection_cuda cuda 1
        - cd ../fdtd
        - ./scripts/benchmark.jl max_perf ../../build/examples/fdtd/fdtd_coef_device_cuda cuda 1
        - cd ../hotspot
        - ./scripts/benchmark.jl max_perf ../../build/examples/hotspot/hotspot_cuda cuda 1
        - cd ../jacobi
        - ./scripts/benchmark.jl max_perf ../../build/examples/jacobi/Jacobi5General_cuda 1
    artifacts:
        paths:
            - examples/*/metrics.*.json

# =======
# Release
# =======

release:
    stage: release
    when: always
    rules:
        - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH # Only deploy the binaries on the main branch
    tags:
        - noctua2
    variables:
        SCHEDULER_PARAMETERS: -A $SLURM_ACCOUNT -p normal -c 8 --mem 2G -t 00:05:00
    before_script:
        - source ./scripts/env_base.sh
    script:
        - ./scripts/publish-release.sh
