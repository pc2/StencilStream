stages:
    - preevaluation
    - synthesis
    - benchmark
    - analysis
    - release

variables:
    TAG_NAME: cibuild-${CI_PIPELINE_IID}
    RELEASE_NAME: CI build ${CI_PIPELINE_IID}
    PACKAGE_REGISTRY_URL: ${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic

default:
    id_tokens:
        CI_JOB_JWT:
            aud: https://git.uni-paderborn.de

.cheap_job:
    rules:
        - if: $CI_PIPELINE_SOURCE == 'merge_request_event' # Run for all merge-requests (even drafts)
        - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH # Run on the main branch

.expensive_job:
    rules:
        - if: $CI_PIPELINE_SOURCE == 'merge_request_event' && $CI_MERGE_REQUEST_TITLE !~ /^Draft:/ # Run for non-draft merge requests
        - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH # Run on the main branch

.fpga_job:
    before_script:
        - source scripts/env_fpga.sh

.cuda_job:
    before_script:
        - source scripts/env_cuda.sh


.synthesis:
    extends:
        - .expensive_job
        - .fpga_job
    stage: synthesis
    tags:
        - noctua2
    variables:
        SCHEDULER_PARAMETERS: -A pc2-shks -p normal -t 1-00:00:00 -c 8 --mem 120G
    script:
        - ./scripts/synthesize.sh "${PACKAGE_REGISTRY_URL}" "${TAG_NAME}" "${STST_EXAMPLE}" "${STST_EXECUTABLE}"
    artifacts:
        when: always
        paths:
            - "build/examples/${STST_EXAMPLE}/${STST_EXECUTABLE}"
            - "build/examples/${STST_EXAMPLE}/${STST_EXECUTABLE}.prj/reports"
            - "build/examples/${STST_EXAMPLE}/${STST_EXECUTABLE}.prj/quartuserr.tmp"
            - "build/examples/${STST_EXAMPLE}/${STST_EXECUTABLE}.prj/quartus_sh_compile.log"
            - "build/examples/${STST_EXAMPLE}/${STST_EXECUTABLE}.tar.gz"

# =============
# Preevaluation
# =============

documentation:
    extends: .cheap_job
    stage: preevaluation
    tags:
        - docker-shared
    image: alpine
    before_script:
        - apk add --no-cache doxygen graphviz font-noto
    script:
        - doxygen
    artifacts:
        paths:
            - doxygen/html

FPGA/CPU unit test:
    extends:
        - .cheap_job
        - .fpga_job
    stage: preevaluation
    tags:
        - noctua2
    variables:
        SCHEDULER_PARAMETERS: -A pc2-shks -p normal -t 0:10:00 -c 16 --mem 4G
    script:
        - mkdir -p build
        - cd build
        - cmake ..
        - make unit_test_cpu unit_test_fpga -j16
        - ./tests/unit_test_cpu
        - ./tests/unit_test_fpga
    artifacts:
        paths:
            - Manifest.toml

# ===============
# CUDA benchmarks
# ===============

CUDA benchmark:
    extends:
        - .cuda_job
        - .expensive_job
    stage: benchmark
    tags:
        - noctua2
    variables:
        SCHEDULER_PARAMETERS: -A pc2-shks -p gpu --gres=gpu:a100:1 -c 16 --mem 16G --time=01:00:00
    script:
        - mkdir -p build
        - cd build
        - cmake ..
        - make unit_test_cuda convection_cuda hotspot_cuda fdtd_coef_device_cuda -j16
        - ./tests/unit_test_cuda
        - cd ../examples/convection
        - ./scripts/benchmark.jl max_perf ../../build/examples/convection/convection_cuda cuda
        - cd ../fdtd
        - ./scripts/benchmark.jl max_perf ../../build/examples/fdtd/fdtd_coef_device_cuda cuda
        - cd ../hotspot
        - ./scripts/benchmark.jl max_perf ../../build/examples/hotspot/hotspot_cuda cuda
    artifacts:
        paths:
            - examples/*/metrics.cuda.json

# =======
# Release
# =======

release:
    stage: release
    when: always
    rules:
        - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH # Only deploy the binaries on the main branch
    tags:
        - noctua2
    variables:
        SCHEDULER_PARAMETERS: -A pc2-shks -p normal -c 8 --mem 2G -t 00:05:00
    before_script:
        - source ./scripts/env_base.sh
    script:
        - ./scripts/publish-release.sh